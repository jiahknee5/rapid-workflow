<!doctype html>
<html lang="en" data-theme="linear" data-mode="basic">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FORGE Observe</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ═══════════════════════════════════════════════ */
/* THEME: LINEAR / VERCEL (default)                */
/* ═══════════════════════════════════════════════ */
[data-theme="linear"] {
  --bg: #FFFFFF; --bg-alt: #FAFBFC; --surface: #F4F5F7; --surface-hover: #EBEDF0;
  --border: #E1E4E8; --border-light: #EBEDF0;
  --text: #1B1F24; --text-2: #57606A; --text-3: #8B949E;
  --accent: #5E6AD2; --accent-dim: rgba(94,106,210,0.08); --accent-text: #5E6AD2;
  --ok: #2DA44E; --ok-dim: rgba(45,164,78,0.08);
  --warn: #BF8700; --warn-dim: rgba(191,135,0,0.07);
  --err: #CF222E; --err-dim: rgba(207,34,46,0.06);
  --info: #0969DA; --info-dim: rgba(9,105,218,0.06);
  --mono: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --radius: 8px; --radius-sm: 4px;
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --topbar-bg: #FFFFFF; --topbar-text: #1B1F24; --topbar-border: #E1E4E8;
}

/* ═══════════════════════════════════════════════ */
/* THEME: GRAFANA / DATADOG                        */
/* ═══════════════════════════════════════════════ */
[data-theme="grafana"] {
  --bg: #111217; --bg-alt: #181B1F; --surface: #1E2028; --surface-hover: #262830;
  --border: #2C2F36; --border-light: #363940;
  --text: #DCE0E8; --text-2: #9DA5B4; --text-3: #6B7280;
  --accent: #3B82F6; --accent-dim: rgba(59,130,246,0.12); --accent-text: #60A5FA;
  --ok: #22C55E; --ok-dim: rgba(34,197,94,0.12);
  --warn: #F59E0B; --warn-dim: rgba(245,158,11,0.10);
  --err: #EF4444; --err-dim: rgba(239,68,68,0.10);
  --info: #38BDF8; --info-dim: rgba(56,189,248,0.10);
  --mono: "JetBrains Mono", "Fira Code", monospace;
  --sans: "Inter", -apple-system, sans-serif;
  --radius: 4px; --radius-sm: 3px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --topbar-bg: #111217; --topbar-text: #DCE0E8; --topbar-border: #2C2F36;
}

/* ═══════════════════════════════════════════════ */
/* THEME: BLOOMBERG TERMINAL                       */
/* ═══════════════════════════════════════════════ */
[data-theme="bloomberg"] {
  --bg: #000000; --bg-alt: #0A0A0A; --surface: #111111; --surface-hover: #1A1A1A;
  --border: #222222; --border-light: #2A2A2A;
  --text: #FF8C00; --text-2: #CC7000; --text-3: #666666;
  --accent: #FF8C00; --accent-dim: rgba(255,140,0,0.08); --accent-text: #FF8C00;
  --ok: #00FF41; --ok-dim: rgba(0,255,65,0.06);
  --warn: #FFD700; --warn-dim: rgba(255,215,0,0.06);
  --err: #FF0040; --err-dim: rgba(255,0,64,0.06);
  --info: #00BFFF; --info-dim: rgba(0,191,255,0.06);
  --mono: "Bloomberg Mono", "Courier New", monospace;
  --sans: "Bloomberg Mono", "Courier New", monospace;
  --radius: 0px; --radius-sm: 0px;
  --shadow: none;
  --shadow-md: none;
  --topbar-bg: #000000; --topbar-text: #FF8C00; --topbar-border: #333333;
}

/* ═══════════════════════════════════════════════ */
/* THEME: RAYCAST / ARC                            */
/* ═══════════════════════════════════════════════ */
[data-theme="raycast"] {
  --bg: #1A1A2E; --bg-alt: #16162A; --surface: #222244; --surface-hover: #2A2A50;
  --border: #333366; --border-light: #2E2E55;
  --text: #E8E8F0; --text-2: #A0A0C0; --text-3: #6B6B8E;
  --accent: #7C5CFC; --accent-dim: rgba(124,92,252,0.12); --accent-text: #A78BFA;
  --ok: #34D399; --ok-dim: rgba(52,211,153,0.10);
  --warn: #FBBF24; --warn-dim: rgba(251,191,36,0.10);
  --err: #FB7185; --err-dim: rgba(251,113,133,0.10);
  --info: #67E8F9; --info-dim: rgba(103,232,249,0.10);
  --mono: "SF Mono", "JetBrains Mono", monospace;
  --sans: "SF Pro Display", -apple-system, sans-serif;
  --radius: 12px; --radius-sm: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.2);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
  --topbar-bg: rgba(26,26,46,0.85); --topbar-text: #E8E8F0; --topbar-border: #333366;
}
[data-theme="raycast"] .topbar { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
[data-theme="raycast"] .health-card, [data-theme="raycast"] .agent-card { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: rgba(34,34,68,0.6); }

/* ═══════════════════════════════════════════════ */
/* BASE LAYOUT (all themes)                        */
/* ═══════════════════════════════════════════════ */
html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
body { margin: 0; height: 100vh; display: flex; flex-direction: column; }

/* Topbar */
.topbar { background: var(--topbar-bg); color: var(--topbar-text); padding: 8px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--topbar-border); flex-shrink: 0; z-index: 100; }
.topbar-brand { font-size: 0.9rem; font-weight: 800; letter-spacing: 0.02em; display: flex; align-items: center; gap: 6px; }
.topbar-brand span { font-weight: 400; font-size: 0.65rem; opacity: 0.5; letter-spacing: 0.1em; text-transform: uppercase; }
.topbar-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }
.topbar-dot.live { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.topbar-phase { background: var(--accent-dim); color: var(--accent-text); padding: 3px 10px; border-radius: var(--radius-sm); font-size: 0.68rem; font-weight: 700; }
.topbar-stats { display: flex; gap: 20px; margin-left: auto; }
.topbar-stat { text-align: center; }
.topbar-stat .v { font-size: 0.95rem; font-weight: 700; }
.topbar-stat .l { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5; }

/* Controls */
.controls { display: flex; gap: 4px; margin-left: 12px; }
.ctrl-btn { background: var(--surface); color: var(--text-2); border: 1px solid var(--border); padding: 3px 8px; border-radius: var(--radius-sm); font-size: 0.58rem; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: var(--sans); letter-spacing: 0.04em; }
.ctrl-btn:hover { background: var(--surface-hover); color: var(--text); }
.ctrl-btn.active { background: var(--accent-dim); color: var(--accent-text); border-color: var(--accent-text); }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-alt); flex-shrink: 0; }
.tab { padding: 7px 16px; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
.tab:hover { color: var(--text-2); }
.tab.active { color: var(--accent-text); border-bottom-color: var(--accent-text); }
.panel { display: none; flex: 1; overflow: hidden; }
.panel.active { display: flex; }

/* Main layout */
.main-row { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 260px; background: var(--bg-alt); border-right: 1px solid var(--border); overflow-y: auto; padding: 10px; flex-shrink: 0; }
.stream { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

/* Agent cards */
.a-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; margin-bottom: 6px; cursor: pointer; transition: all 0.15s; }
.a-card:hover { background: var(--surface-hover); border-color: var(--text-3); }
.a-card.selected { border-color: var(--accent-text); box-shadow: 0 0 0 1px var(--accent-text); }
.a-card .name { font-size: 0.75rem; font-weight: 700; }
.a-card .role { font-size: 0.55rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
.a-card .task { font-size: 0.65rem; color: var(--text-2); margin-top: 3px; }
.a-card .stats { display: flex; gap: 6px; margin-top: 4px; font-size: 0.55rem; color: var(--text-3); }
.a-card .stats span { background: var(--bg); padding: 1px 5px; border-radius: 2px; }
.ctx-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
.ctx-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* Health view */
.health-grid { padding: 16px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; overflow-y: auto; align-content: start; width: 100%; }
.health-hero { grid-column: 1 / -1; display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-radius: var(--radius); border: 1px solid var(--border); }
.health-hero .icon { font-size: 1.8rem; line-height: 1; }
.health-hero h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 1px; }
.health-hero p { font-size: 0.72rem; color: var(--text-2); }
.health-hero.ok { background: var(--ok-dim); border-color: var(--ok); }
.health-hero.warn { background: var(--warn-dim); border-color: var(--warn); }
.health-hero.bad { background: var(--err-dim); border-color: var(--err); }
.health-hero.idle { background: var(--surface); }
.h-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; box-shadow: var(--shadow); }
.h-card h3 { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
.h-card .big { font-size: 1.6rem; font-weight: 800; line-height: 1.1; }
.h-card .sub { font-size: 0.65rem; color: var(--text-2); margin-top: 3px; }
.h-card .bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.h-card .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.h-card.wide { grid-column: 1 / -1; }
.h-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.h-pill { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 10px; font-size: 0.6rem; font-weight: 600; background: var(--bg); border: 1px solid var(--border); cursor: pointer; transition: all 0.1s; }
.h-pill:hover { border-color: var(--accent-text); }
.h-pill .dot { width: 5px; height: 5px; border-radius: 50%; }
.h-recent { margin-top: 4px; }
.h-recent-row { display: flex; gap: 8px; padding: 3px 0; font-size: 0.68rem; border-bottom: 1px solid var(--border-light); }
.h-recent-row:last-child { border-bottom: none; }
.h-recent-time { width: 48px; flex-shrink: 0; color: var(--text-3); font-size: 0.6rem; font-family: var(--mono); }
.h-recent-text { flex: 1; color: var(--text-2); }
.h-blocker { color: var(--err); font-size: 0.68rem; padding: 3px 0; }
.badge { background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.6rem; font-weight: 700; margin-left: auto; flex-shrink: 0; }

/* Event stream */
.ev-head { display: flex; padding: 5px 12px; background: var(--bg-alt); border-bottom: 1px solid var(--border); font-size: 0.52rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); position: sticky; top: 0; z-index: 5; }
.ev-row { display: flex; padding: 3px 12px; border-bottom: 1px solid var(--border-light); font-family: var(--mono); font-size: 0.68rem; line-height: 1.6; transition: background 0.15s; }
.ev-row:hover { background: var(--surface); }
.ev-row.flash { animation: rowFlash 1s; }
@keyframes rowFlash { 0% { background: var(--accent-dim); } 100% { background: transparent; } }
.ev-time { width: 60px; flex-shrink: 0; color: var(--text-3); font-size: 0.6rem; }
.ev-seq { width: 32px; flex-shrink: 0; text-align: right; color: var(--text-3); font-size: 0.58rem; margin-right: 6px; }
.ev-agent { width: 80px; flex-shrink: 0; font-weight: 600; font-size: 0.64rem; cursor: pointer; }
.ev-type { width: 72px; flex-shrink: 0; font-weight: 700; font-size: 0.56rem; letter-spacing: 0.04em; text-transform: uppercase; padding: 1px 4px; border-radius: var(--radius-sm); text-align: center; margin-right: 6px; }
.ev-detail { flex: 1; color: var(--text-2); }
.ev-ctx { width: 52px; flex-shrink: 0; text-align: right; color: var(--text-3); font-size: 0.58rem; }
/* Event type badges */
.t-SPAWN { background: var(--accent-dim); color: var(--accent-text); }
.t-PHASE { background: var(--info-dim); color: var(--info); }
.t-GATE { background: var(--warn-dim); color: var(--warn); }
.t-READ { background: var(--surface); color: var(--text-2); }
.t-WRITE { background: var(--ok-dim); color: var(--ok); }
.t-TOOL { background: var(--surface); color: var(--text-2); }
.t-SEND, .t-RECV { background: var(--accent-dim); color: var(--accent-text); }
.t-LOOP_START, .t-LOOP_ITER, .t-LOOP_END { background: var(--warn-dim); color: var(--warn); }
.t-ERROR { background: var(--err); color: #fff; }
.t-COMPLETE { background: var(--ok); color: #fff; }
.t-DECIDE, .t-ESCALATE { background: var(--warn-dim); color: var(--warn); }

/* Filter bar */
.filter { display: flex; align-items: center; gap: 6px; padding: 4px 12px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 0.6rem; }
.filter.hidden { display: none; }
.filter-pill { background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: 600; cursor: pointer; }
.filter-clear { color: var(--text-3); cursor: pointer; }
.filter-clear:hover { color: var(--text); }

/* Graph + Gantt panels (reuse from v1 but themed) */
.viz-panel { flex: 1; overflow: auto; padding: 8px; }
.viz-panel svg { width: 100%; }
.viz-panel svg text { font-family: var(--sans); fill: var(--text); }

/* Expert-only elements */
[data-mode="basic"] .expert { display: none; }

/* Section label */
.sec-label { font-size: 0.5rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); padding: 8px 0 3px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

@media (max-width: 768px) { .sidebar { display: none; } .health-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- FORGE Document Suite Nav -->
<nav style="display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 0.68rem; font-weight: 600; letter-spacing: 0.04em; background: var(--bg-alt, var(--bg, #FAFBFC));">
  <span style="color: var(--accent, #5E6AD2); font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.58rem; margin-right: 8px;">FORGE</span>
  <a href="../docs/forge-architecture.html" style="color: var(--text-2, #57606A); padding: 4px 10px; border-radius: var(--radius-sm, 4px); text-decoration: none;">Architecture</a>
  <a href="dashboard.html" style="color: var(--text, #1B1F24); background: var(--surface, #F4F5F7); padding: 4px 10px; border-radius: var(--radius-sm, 4px); text-decoration: none; border: 1px solid var(--border, #E1E4E8);">Observatory</a>
  <a href="forge-spec.html" style="color: var(--text-2, #57606A); padding: 4px 10px; border-radius: var(--radius-sm, 4px); text-decoration: none;">Spec</a>
  <a href="../docs/forge-comparison.html" style="color: var(--text-2, #57606A); padding: 4px 10px; border-radius: var(--radius-sm, 4px); text-decoration: none;">Comparison</a>
</nav>

<div class="topbar">
  <div class="topbar-brand">FORGE <span>observe</span></div>
  <div class="topbar-dot live" id="dot"></div>
  <div class="topbar-phase" id="phase">—</div>
  <div class="topbar-stats">
    <div class="topbar-stat"><div class="v" id="s-agents">0</div><div class="l">Agents</div></div>
    <div class="topbar-stat"><div class="v" id="s-events">0</div><div class="l">Events</div></div>
    <div class="topbar-stat expert"><div class="v" id="s-ctx">—</div><div class="l">Context</div></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" onclick="setMode(this.dataset.m)" data-m="basic" id="mode-basic">Basic</button>
    <button class="ctrl-btn active" onclick="setMode(this.dataset.m)" data-m="expert" id="mode-expert">Expert</button>
    <span style="width:1px;background:var(--border);margin:0 4px;"></span>
    <button class="ctrl-btn" onclick="setTheme('linear')" data-t="linear">Linear</button>
    <button class="ctrl-btn" onclick="setTheme('grafana')" data-t="grafana">Grafana</button>
    <button class="ctrl-btn" onclick="setTheme('bloomberg')" data-t="bloomberg">Terminal</button>
    <button class="ctrl-btn" onclick="setTheme('raycast')" data-t="raycast">Raycast</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('health')">Health</div>
  <div class="tab" onclick="showTab('stream')">Events</div>
  <div class="tab expert" onclick="showTab('graph')">Graph</div>
  <div class="tab expert" onclick="showTab('gantt')">Timeline</div>
</div>

<!-- HEALTH PANEL -->
<div class="panel active" id="p-health" style="overflow-y:auto;">
  <div class="health-grid" id="health"></div>
</div>

<!-- EVENTS PANEL -->
<div class="panel" id="p-stream">
  <div class="main-row">
    <div class="sidebar" id="sidebar"></div>
    <div class="stream" id="stream">
      <div class="filter hidden" id="filter-bar"><span style="color:var(--text-3)">Showing:</span> <span class="filter-pill" id="fpill" onclick="clearFilter()">—</span> <span class="filter-clear" onclick="clearFilter()">clear</span></div>
      <div class="ev-head">
        <span style="width:60px">Time</span><span style="width:32px;text-align:right;margin-right:6px">#</span>
        <span style="width:80px">Agent</span><span style="width:72px;text-align:center;margin-right:6px">Type</span>
        <span style="flex:1">Detail</span><span class="expert" style="width:52px;text-align:right">Ctx</span>
      </div>
      <div id="rows"></div>
      <div id="anchor" style="height:1px;"></div>
    </div>
  </div>
</div>

<!-- GRAPH PANEL -->
<div class="panel" id="p-graph"><div class="viz-panel"><svg id="gsvg" viewBox="0 0 900 280"></svg></div></div>

<!-- GANTT PANEL -->
<div class="panel" id="p-gantt"><div class="viz-panel"><svg id="tsvg" viewBox="0 0 1200 300"></svg></div></div>

<script>
// ═══ STATE ═══
const API = '';
let lastSeq = 0, allEvents = [], autoScroll = true, activeFilter = null;
let lastVisitSeq = 0;
try { lastVisitSeq = parseInt(localStorage.getItem('fo-seq') || '0'); } catch(e) {}
const agentColors = {}, pool = ['accent','ok','info','warn','err'];
let ci = 0;
function ac(a) { if (!agentColors[a]) { agentColors[a] = pool[ci++ % pool.length]; } return agentColors[a]; }

// ═══ THEME + MODE ═══
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  document.querySelectorAll('[data-t]').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  try { localStorage.setItem('fo-theme', t); } catch(e) {}
}
function setMode(m) {
  document.documentElement.dataset.mode = m;
  document.getElementById('mode-basic').classList.toggle('active', m === 'basic');
  document.getElementById('mode-expert').classList.toggle('active', m === 'expert');
  try { localStorage.setItem('fo-mode', m); } catch(e) {}
}
try {
  const st = localStorage.getItem('fo-theme'); if (st) setTheme(st);
  const sm = localStorage.getItem('fo-mode'); if (sm) setMode(sm);
} catch(e) {}

// ═══ TABS ═══
function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${id}"]`).classList.add('active');
  document.getElementById(`p-${id}`).classList.add('active');
}

// ═══ UTILS ═══
function ft(t) { if(!t) return '—'; const d=new Date(t); return d.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function fc(c) { if(!c) return ''; if(typeof c==='string') return c; if(c>1e6) return '~'+(c/1e6).toFixed(1)+'M'; if(c>1000) return '~'+Math.round(c/1000)+'K'; return '~'+c; }
function cp(c) { let n=c; if(!n) return 0; if(typeof n==='string') n=parseInt(n.replace(/[~KkM]/g,''))*(n.includes('M')?1e6:n.includes('K')||n.includes('k')?1000:1); return Math.min(100,Math.round(n/200000*100)); }

function humanize(e) {
  const a=e.agent||'?', d=e.detail||'';
  switch(e.event) {
    case 'SPAWN': return `${a} came online — ${d}`;
    case 'PHASE': return `Entering ${e.phase||'?'}: ${d}`;
    case 'GATE': return `Paused for review — ${d}`;
    case 'READ': return `${a} read ${d}`;
    case 'WRITE': return `${a} wrote ${d}`;
    case 'TOOL': return `${a} ran ${d}`;
    case 'SEND': return `${a} → ${e.target||'?'}: ${d}`;
    case 'RECV': return `${a} ← ${e.from||'?'}: ${d}`;
    case 'LOOP_START': return `${a} starting loop — ${d}`;
    case 'LOOP_ITER': return `${a} retry ${d}`;
    case 'LOOP_END': return `${a} loop done — ${d}`;
    case 'DECIDE': return `${a} decided: ${d}`;
    case 'ESCALATE': return `${a} escalated: ${d}`;
    case 'ERROR': return `${a} error: ${d}`;
    case 'COMPLETE': return `${a} finished — ${d}`;
    default: return d || e.event || '?';
  }
}

// ═══ FILTER ═══
function filterAgent(a) { activeFilter=a; document.getElementById('filter-bar').classList.remove('hidden'); document.getElementById('fpill').textContent=a; rerender(); }
function clearFilter() { activeFilter=null; document.getElementById('filter-bar').classList.add('hidden'); rerender(); }
function rerender() { const f=activeFilter?allEvents.filter(e=>e.agent===activeFilter):allEvents; document.getElementById('rows').innerHTML=f.slice(-2000).map(e=>evRow(e,false)).join(''); }

// ═══ SIDEBAR ═══
function renderSidebar(agents) {
  const el=document.getElementById('sidebar');
  if(!agents.length) { el.innerHTML='<div class="sec-label">Agents</div><div style="padding:16px;color:var(--text-3);font-size:0.72rem;">None yet</div>'; return; }
  el.innerHTML = '<div class="sec-label">Agents</div>' + agents.map(a => {
    const pct=cp(a.ctx_est), c=ac(a.agent), sel=activeFilter===a.agent;
    return `<div class="a-card${sel?' selected':''}" onclick="filterAgent('${a.agent}')">
      <div class="name" style="color:var(--${c})">${a.agent}</div>
      <div class="role">${a.role||''}</div>
      ${a.task?`<div class="task">${a.task}</div>`:''}
      <div class="stats"><span>R:${a.reads||0}</span><span>W:${a.writes||0}</span><span>S:${a.sends||0}</span><span class="expert">${fc(a.ctx_est)}</span></div>
      <div class="ctx-bar"><div class="ctx-fill" style="width:${pct}%;background:var(--${pct>75?'err':pct>50?'warn':'ok'})"></div></div>
    </div>`;
  }).join('');
}

// ═══ EVENTS ═══
function evRow(e, isNew) {
  const c=ac(e.agent||'system'), vis=!activeFilter||e.agent===activeFilter;
  return `<div class="ev-row${isNew?' flash':''}" style="${vis?'':'display:none'}">
    <span class="ev-time">${ft(e.t)}</span>
    <span class="ev-seq expert">${e.seq||''}</span>
    <span class="ev-agent" style="color:var(--${c})" onclick="filterAgent('${e.agent||''}')">${e.agent||'—'}</span>
    <span class="ev-type t-${e.event||'TOOL'}">${e.event||'?'}</span>
    <span class="ev-detail">${humanize(e)}</span>
    <span class="ev-ctx expert">${fc(e.ctx_est)}</span>
  </div>`;
}
function renderEvents(evts) {
  const el=document.getElementById('rows');
  const newOnes=evts.filter(e=>(e.seq||0)>lastSeq);
  if(newOnes.length && el.children.length>0) { newOnes.forEach(e=>el.insertAdjacentHTML('beforeend',evRow(e,true))); }
  else { el.innerHTML=evts.slice(-2000).map(e=>evRow(e,false)).join(''); }
  if(evts.length) lastSeq=Math.max(...evts.map(e=>e.seq||0));
  while(el.children.length>2000) el.removeChild(el.firstChild);
  if(autoScroll) document.getElementById('anchor').scrollIntoView({behavior:'smooth'});
}

// ═══ HEALTH ═══
function renderHealth(agents, meta) {
  const el=document.getElementById('health');
  const active=agents.filter(a=>a.status==='active').length;
  const errs=agents.filter(a=>a.status==='error');
  const blockers=allEvents.filter(e=>e.event==='ERROR'||e.event==='ESCALATE');
  const newSince=allEvents.filter(e=>(e.seq||0)>lastVisitSeq).length;
  const ctxMax=Math.max(...agents.map(a=>cp(a.ctx_est)||0),0);

  let st='idle',ic='◎',h1='Waiting for a build',h2='Run /forge to begin';
  if(allEvents.length>0&&active>0) {
    if(errs.length||blockers.length) { st='bad';ic='⚠';h1=`${errs.length} error${errs.length!==1?'s':''}, ${blockers.length} blocker${blockers.length!==1?'s':''}`;h2='Check blockers below'; }
    else if(ctxMax>75) { st='warn';ic='⏳';h1='Running — context pressure high';h2=`${active} agent${active!==1?'s':''} active, highest ctx ${ctxMax}%`; }
    else { st='ok';ic='✓';h1='Running — healthy';h2=`${active} agent${active!==1?'s':''} in ${meta.phase||'?'}`; }
  } else if(allEvents.length>0) { st='ok';ic='✓';h1='Build complete';h2=`${allEvents.length} events processed`; }

  const pills=agents.map(a=>{
    const dc=a.status==='active'?'var(--ok)':a.status==='error'?'var(--err)':'var(--text-3)';
    return `<span class="h-pill" onclick="filterAgent('${a.agent}');showTab('stream')"><span class="dot" style="background:${dc}"></span>${a.agent}</span>`;
  }).join('');

  const recent=allEvents.slice(-8).reverse().map(e=>
    `<div class="h-recent-row"><span class="h-recent-time">${ft(e.t)}</span><span class="h-recent-text">${humanize(e)}</span></div>`
  ).join('')||'<div style="color:var(--text-3);font-size:0.68rem">No events</div>';

  const bhtml=blockers.slice(-5).map(b=>`<div class="h-blocker">⚠ ${humanize(b)}</div>`).join('')||'<div style="color:var(--text-3);font-size:0.68rem">None</div>';

  el.innerHTML=`
    <div class="health-hero ${st}">
      <div class="icon">${ic}</div>
      <div style="flex:1"><h2>${h1}</h2><p>${h2}</p></div>
      ${newSince?`<div class="badge">${newSince} new</div>`:''}
    </div>
    <div class="h-card"><h3>Phase</h3><div class="big">${meta.phase||'—'}</div><div class="sub">${allEvents.length} events</div></div>
    <div class="h-card"><h3>Agents</h3><div class="big">${active}</div><div class="h-pills">${pills||'<span style="color:var(--text-3);font-size:0.6rem">None</span>'}</div></div>
    <div class="h-card expert"><h3>Context Pressure</h3><div class="big" style="color:var(--${ctxMax>75?'err':ctxMax>50?'warn':'ok'})">${ctxMax}%</div><div class="bar"><div class="bar-fill" style="width:${ctxMax}%;background:var(--${ctxMax>75?'err':ctxMax>50?'warn':'ok'})"></div></div></div>
    <div class="h-card expert"><h3>Cost Est.</h3><div class="big">${fc(meta.ctx_total_est)}</div><div class="sub">total tokens</div></div>
    <div class="h-card wide"><h3>Blockers</h3>${bhtml}</div>
    <div class="h-card wide"><h3>Recent</h3><div class="h-recent">${recent}</div></div>
  `;
}

// ═══ POLL ═══
async function poll() {
  try {
    const [eR,aR,mR]=await Promise.all([fetch(`${API}/api/events?since=${lastSeq}`),fetch(`${API}/api/agents`),fetch(`${API}/api/meta`)]);
    const evts=await eR.json(), agents=await aR.json(), meta=await mR.json();
    if(evts.length) { allEvents=allEvents.concat(evts.filter(e=>(e.seq||0)>lastSeq)); if(allEvents.length>3000) allEvents=allEvents.slice(-2000); renderEvents(allEvents); }
    renderSidebar(agents); renderHealth(agents,meta);
    document.getElementById('phase').textContent=meta.phase||'—';
    document.getElementById('s-agents').textContent=meta.active_agents||0;
    document.getElementById('s-events').textContent=meta.total_events||0;
    document.getElementById('s-ctx').textContent=fc(meta.ctx_total_est)||'—';
    try{localStorage.setItem('fo-seq',String(lastSeq));}catch(e){}
    document.getElementById('dot').style.background='var(--ok)';
  } catch(e) { document.getElementById('dot').style.background='var(--err)'; }
}

document.getElementById('stream')?.addEventListener('scroll',function(){autoScroll=(this.scrollTop+this.clientHeight>=this.scrollHeight-50);});
poll(); setInterval(poll,2000);
</script>
