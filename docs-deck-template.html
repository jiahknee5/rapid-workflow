<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Documentation Deck — [PROJECT NAME]</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.min.css">
<style>
/* ========================================================
   UNIVERSAL DOCS DECK TEMPLATE
   Extends decision-deck-template.html with slide types for
   every phase of the forge pipeline. Shared across all projects.

   Slide types:
     hub       — master navigation (one card per folder)
     vision    — pillar cards, north star callout
     intake    — requirements table (MUST/SHOULD/MAY)
     research  — trade-off matrices, evidence cards
     panel     — expert cards with verdicts (from decision-deck)
     spec      — architecture SVG, state machine, interface table
     build     — task graph, agent map, timeline
     walk      — scenario cards with inner voice
     gaps      — gap cards by pillar + severity
     decision  — options grid with pro/con (from decision-deck)
     tests     — coverage matrix, results dashboard
     changelog — change entries with phase attribution
   ======================================================== */

:root{
  --ink:#0a1929;
  --ink-2:#374151;
  --ink-3:#6b7280;
  --ink-4:#9ca3af;
  --paper:#fff;
  --hairline:#eef0f3;
  --rule:#d1d5db;
  --navy:#0d2340;
  --teal:#1f8a8a;
  --teal-tint:#f3f8f8;
  --accent:#b8400a;
  --amber-tint:#fdf6ec;
  --amber-rule:#f0c89e;
  --spec-tint:#f3f6fc;
  --green:#047857;
  --green-tint:#ecfdf5;
  --green-rule:#a7f3d0;
  --red:#b91c1c;
  --red-tint:#fef2f2;
  --purple:#6d28d9;
  --purple-tint:#faf5ff;
  --ui-sans:'Inter',-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
  --ui-serif:'Source Serif 4',Georgia,'Times New Roman',serif;
  --ui-mono:'IBM Plex Mono',Menlo,Consolas,monospace;
}
html,body{background:var(--paper);}
.reveal{font-family:var(--ui-sans);color:var(--ink);font-feature-settings:'ss01','cv01','cv11';-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
.reveal .slides{text-align:left;}
.slide{position:relative;width:1280px;height:720px;padding:28px 32px 28px 32px;box-sizing:border-box;background:var(--paper);display:flex;flex-direction:column;}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:0.22em;color:var(--teal);text-transform:uppercase;margin-bottom:4px;}
.title{font-family:var(--ui-serif);font-size:22px;font-weight:600;color:var(--ink);border-bottom:1px solid var(--rule);padding-bottom:10px;margin-bottom:12px;letter-spacing:-0.015em;line-height:1.3;}
.footer{position:absolute;left:32px;right:32px;bottom:10px;display:flex;justify-content:space-between;font-size:10px;color:var(--ink-4);border-top:1px solid var(--hairline);padding-top:6px;letter-spacing:0.05em;}

/* ====== Phase breadcrumb ====== */
.phase-nav{display:flex;align-items:center;gap:3px;padding:4px 0 8px;margin-bottom:4px;}
.phase-nav .ph{font-family:var(--ui-mono);font-size:8px;padding:2px 6px;border-radius:2px;background:#eef0f3;color:var(--ink-3);}
.phase-nav .ph.active{background:var(--navy);color:#fff;font-weight:500;}
.phase-nav .sep{color:var(--ink-4);font-size:8px;margin:0 1px;}

/* ====== Badges ====== */
.badge{display:inline-block;font-family:var(--ui-mono);font-size:9px;font-weight:600;letter-spacing:0.8px;padding:3px 8px;border-radius:3px;text-transform:uppercase;margin-left:12px;vertical-align:middle;}
.badge.decided,.badge.stable,.badge.pass{background:var(--green-tint);color:var(--green);border:1px solid var(--green-rule);}
.badge.open,.badge.draft,.badge.caution{background:var(--amber-tint);color:var(--accent);border:1px solid var(--amber-rule);}
.badge.blocked,.badge.fail,.badge.block{background:var(--red-tint);color:var(--red);border:1px solid #fecaca;}
.badge.locked{background:var(--spec-tint);color:var(--navy);border:1px solid #c7d2fe;}
.badge.empty{background:#f3f4f6;color:var(--ink-4);border:1px solid var(--rule);}

/* ====== Card grids ====== */
.options{display:grid;gap:14px;flex:1;min-height:0;margin-top:8px;}
.options.cols-2{grid-template-columns:1fr 1fr;}
.options.cols-3{grid-template-columns:1fr 1fr 1fr;}
.options.cols-4{grid-template-columns:1fr 1fr 1fr 1fr;}
.option{border:1px solid var(--rule);border-radius:4px;padding:14px 16px;display:flex;flex-direction:column;background:var(--paper);}
.option.chosen,.option.approve{border-color:var(--green);border-width:2px;background:var(--green-tint);}
.option.rejected,.option.dimmed{opacity:0.55;}
.option.caution{border-color:var(--accent);background:var(--amber-tint);}
.option.block{border-color:var(--red);border-width:2px;background:var(--red-tint);}
.option.navy{border-color:var(--navy);border-width:2px;background:var(--spec-tint);}
.option.teal{border-color:var(--teal);border-width:2px;background:var(--teal-tint);}
.option.purple{border-color:var(--purple);border-width:2px;background:var(--purple-tint);}
.option .opt-name{font-family:var(--ui-serif);font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.option.chosen .opt-name::after{content:" \2713";color:var(--green);font-weight:700;}
.option .opt-desc{font-size:11px;color:var(--ink-2);line-height:1.55;margin-bottom:10px;}

/* ====== Pro/con/ask lists ====== */
.pro-con{display:flex;flex-direction:column;gap:4px;margin-top:auto;}
.pro-con .item{font-size:10px;line-height:1.45;padding-left:14px;text-indent:-14px;}
.pro-con .item.pro{color:var(--green);}
.pro-con .item.pro::before{content:"+ ";font-weight:700;font-family:var(--ui-mono);}
.pro-con .item.con{color:var(--red);}
.pro-con .item.con::before{content:"- ";font-weight:700;font-family:var(--ui-mono);}
.pro-con .item.neutral{color:var(--ink-3);}
.pro-con .item.neutral::before{content:"~ ";font-weight:700;font-family:var(--ui-mono);}
.pro-con .item.must{color:var(--red);font-weight:600;}
.pro-con .item.must::before{content:"MUST ";font-family:var(--ui-mono);font-size:9px;}
.pro-con .item.should{color:var(--accent);}
.pro-con .item.should::before{content:"SHOULD ";font-family:var(--ui-mono);font-size:9px;}
.pro-con .item.may{color:var(--ink-3);}
.pro-con .item.may::before{content:"MAY ";font-family:var(--ui-mono);font-size:9px;}

/* ====== Rationale / callout boxes ====== */
.rationale{background:var(--spec-tint);border-left:3px solid var(--navy);padding:12px 16px;margin-top:12px;border-radius:0 4px 4px 0;}
.rationale.teal{background:var(--teal-tint);border-left-color:var(--teal);}
.rationale.accent{background:var(--amber-tint);border-left-color:var(--accent);}
.rationale.green{background:var(--green-tint);border-left-color:var(--green);}
.rationale.red{background:var(--red-tint);border-left-color:var(--red);}
.rationale .r-label{font-size:9px;font-weight:600;letter-spacing:1.4px;color:var(--navy);text-transform:uppercase;margin-bottom:4px;}
.rationale.teal .r-label{color:var(--teal);}
.rationale.accent .r-label{color:var(--accent);}
.rationale .r-text{font-size:12px;color:var(--ink-2);line-height:1.55;}
.rationale .r-source{font-size:10px;color:var(--ink-4);margin-top:6px;font-style:italic;}

/* ====== Panel / source chips ====== */
.panel-input{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.panel-chip{font-size:9px;font-weight:500;padding:3px 8px;border-radius:12px;background:var(--teal-tint);color:var(--teal);border:1px solid #d1e7e7;}
.panel-chip.navy{background:var(--spec-tint);color:var(--navy);border-color:#c7d2fe;}
.panel-chip.accent{background:var(--amber-tint);color:var(--accent);border-color:var(--amber-rule);}

/* ====== Pillar tags ====== */
.pillars{display:flex;gap:6px;margin-top:6px;}
.pillar-tag{font-size:8px;font-weight:600;letter-spacing:0.6px;padding:2px 6px;border-radius:2px;background:var(--navy);color:#fff;text-transform:uppercase;}

/* ====== Cascade / impact grid ====== */
.cascade{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.cascade.cols-3{grid-template-columns:1fr 1fr 1fr;}
.cascade-item{border-left:2px solid var(--rule);padding:6px 12px;}
.cascade-item.green{border-left-color:var(--green);}
.cascade-item.amber{border-left-color:var(--accent);}
.cascade-item.red{border-left-color:var(--red);}
.cascade-item.navy{border-left-color:var(--navy);}
.cascade-item.teal{border-left-color:var(--teal);}
.cascade-item .c-label{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--ink-3);text-transform:uppercase;margin-bottom:2px;}
.cascade-item .c-text{font-size:11px;color:var(--ink-2);line-height:1.5;}

/* ====== Tables ====== */
.decision-index{width:100%;border-collapse:collapse;margin-top:12px;}
.decision-index th{font-size:9px;font-weight:600;letter-spacing:1.2px;color:var(--ink-3);text-transform:uppercase;text-align:left;padding:6px 10px;border-bottom:2px solid var(--rule);}
.decision-index td{font-size:11.5px;color:var(--ink-2);padding:8px 10px;border-bottom:1px solid var(--hairline);vertical-align:top;}
.decision-index td:first-child{font-weight:600;color:var(--ink);font-family:var(--ui-mono);font-size:10px;width:40px;}
.decision-index .status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.decision-index .status-dot.green{background:var(--green);}
.decision-index .status-dot.amber{background:var(--accent);}
.decision-index .status-dot.red{background:var(--red);}
.decision-index .status-dot.navy{background:var(--navy);}
.decision-index .status-dot.gray{background:var(--ink-4);}

/* ====== Hub navigation cards ====== */
.hub-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex:1;min-height:0;margin-top:12px;}
.hub-card{border:1px solid var(--rule);border-radius:4px;padding:14px 16px;display:flex;flex-direction:column;background:var(--paper);transition:border-color 0.15s;}
.hub-card .hc-phase{font-family:var(--ui-mono);font-size:9px;font-weight:600;letter-spacing:1px;color:var(--ink-4);text-transform:uppercase;margin-bottom:4px;}
.hub-card .hc-name{font-family:var(--ui-serif);font-size:14px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.hub-card .hc-files{font-size:10px;color:var(--ink-3);line-height:1.5;margin-bottom:8px;}
.hub-card .hc-status{margin-top:auto;display:flex;align-items:center;gap:6px;}
.hub-card .hc-bar{flex:1;height:4px;background:var(--hairline);border-radius:2px;overflow:hidden;}
.hub-card .hc-bar-fill{height:100%;border-radius:2px;}
.hub-card .hc-bar-fill.green{background:var(--green);}
.hub-card .hc-bar-fill.amber{background:var(--accent);}
.hub-card .hc-bar-fill.navy{background:var(--navy);}
.hub-card.active{border-color:var(--navy);border-width:2px;background:var(--spec-tint);}
.hub-card.complete{border-color:var(--green);}
.hub-card.empty{opacity:0.5;border-style:dashed;}

/* ====== Metric callouts ====== */
.metrics{display:flex;gap:16px;margin:12px 0;}
.metric{text-align:center;flex:1;}
.metric .m-value{font-family:var(--ui-serif);font-size:28px;font-weight:700;color:var(--ink);}
.metric .m-value.green{color:var(--green);}
.metric .m-value.amber{color:var(--accent);}
.metric .m-value.red{color:var(--red);}
.metric .m-label{font-size:9px;font-weight:600;letter-spacing:1.2px;color:var(--ink-4);text-transform:uppercase;margin-top:2px;}

/* ====== SVG diagram container ====== */
.diagram-frame{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;margin:8px 0;}
.diagram-frame svg{max-width:100%;max-height:100%;}

/* ====== State machine nodes (for workflow diagrams) ====== */
.sm-node{display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--rule);border-radius:4px;padding:6px 12px;font-size:11px;font-weight:600;text-align:center;background:var(--paper);}
.sm-node.active{border-color:var(--navy);background:var(--navy);color:#fff;}
.sm-node.error{border-color:var(--red);color:var(--red);}
.sm-node.success{border-color:var(--green);color:var(--green);}
.sm-arrow{color:var(--ink-4);font-size:16px;padding:0 4px;}

/* ====== Changelog entries ====== */
.changelog{display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto;margin-top:10px;}
.cl-entry{display:grid;grid-template-columns:100px 80px 1fr;gap:8px;padding:6px 10px;border-bottom:1px solid var(--hairline);font-size:11px;align-items:baseline;}
.cl-entry .cl-date{font-family:var(--ui-mono);font-size:10px;color:var(--ink-4);}
.cl-entry .cl-phase{font-family:var(--ui-mono);font-size:9px;font-weight:600;padding:2px 6px;border-radius:2px;background:var(--spec-tint);color:var(--navy);text-align:center;}
.cl-entry .cl-text{color:var(--ink-2);line-height:1.45;}

/* ====== Two-column layout ====== */
.split{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;}
.split.wide-left{grid-template-columns:60% 1fr;}
.split.wide-right{grid-template-columns:1fr 60%;}

/* ====== Requirement traceability ====== */
.req-trace{font-size:10px;color:var(--ink-3);font-family:var(--ui-mono);margin-top:4px;}
.req-trace .from-prd{color:var(--navy);font-weight:500;}
.req-trace .derived{color:var(--teal);font-weight:500;}
.req-trace .open{color:var(--accent);font-weight:500;}
</style>
</head>
<body>
<div class="reveal"><div class="slides">

<!-- ============================================================
     UNIVERSAL DOCS DECK TEMPLATE

     This file is the CSS + component reference for all project
     documentation decks generated by the /docs skill.

     Usage: The /docs skill reads project artifacts and generates
     per-folder deck.html files using these styles inline.

     This file itself is not used at runtime — it's a living
     reference. The skill copies the <style> block verbatim into
     each generated deck.

     Source: ~/projects/workflow/docs-deck-template.html
     ============================================================ -->

<!-- PLACEHOLDER: Slides are generated by the /docs skill -->
<section><div class="slide">
  <div class="eyebrow">Template Reference</div>
  <div class="title">This file defines the universal CSS vocabulary for all documentation decks</div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;color:var(--ink-3);font-size:14px;line-height:1.8;">
      Use <code style="font-family:var(--ui-mono);background:var(--spec-tint);padding:2px 8px;border-radius:3px;">/docs build</code> to generate documentation decks from project artifacts.<br>
      This template is the CSS source of truth — the skill copies it into each generated deck.
    </div>
  </div>
  <div class="footer"><span>Universal Docs Template</span><span>~/projects/workflow/</span></div>
</div></section>

</div></div>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.min.js"></script>
<script>Reveal.initialize({hash:true,width:1280,height:720,margin:0,minScale:0.2,maxScale:2,center:false,transition:'none',controls:true,controlsTutorial:false,progress:true});</script>
</body>
</html>
